<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <title>Nazarene Church</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="img/favicon.ico" rel="icon">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- FontAwesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.10.0/css/all.min.css" rel="stylesheet">

    <style>
        body {
            overflow-x: hidden;
        }

        .navbar {
            background-color: #111;
        }

        .navbar-brand img {
            height: 45px;
        }

        .book-card-mini {
            border-radius: 12px;
            overflow: hidden;
            transition: 0.3s;
            border: 1px solid #eee;
            background: #fff;
        }

        .book-card-mini:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        .book-img-wrapper {
            position: relative;
            aspect-ratio: 2/3;
            overflow: hidden;
        }

        .book-img-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .book-hover-actions {
            position: absolute;
            inset: 0;
            background: rgba(0,107,107,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: 0.3s;
        }

        .book-card-mini:hover .book-hover-actions {
            opacity: 1;
        }

        @media (max-width: 768px) {
            .container-xxl {
                padding-left: 10px;
                padding-right: 10px;
            }
        }
    </style>
</head>

<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark fixed-top">
    <div class="container">

        <a href="index.html" class="navbar-brand d-flex align-items-center">
            <img src="img/Nazarene_logo.png" alt="Logo" class="me-2">
            <span class="fw-bold text-primary">
                Nazarene<span class="text-white">Church</span>
            </span>
        </a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarCollapse">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarCollapse">
            <div class="navbar-nav ms-auto">
                <a href="index.html" class="nav-item nav-link active">الرئيسية</a>
                <a href="about.html" class="nav-item nav-link">من نحن</a>
                <a href="holly-bible.html" class="nav-item nav-link">الكتاب المقدس</a>

                <div class="nav-item dropdown">
                    <a href="#" class="nav-link dropdown-toggle" data-bs-toggle="dropdown">الصفحات</a>
                    <div class="dropdown-menu dropdown-menu-end">
                        <a href="books.html" class="dropdown-item">الكتب</a>
                        <a href="faith.html" class="dropdown-item">بنود الايمان</a>
                        <a href="basics.html" class="dropdown-item">اساسيات الكنيسة</a>
                        <a href="service.html" class="dropdown-item">دستور الكنيسة</a>
                    </div>
                </div>

                <a href="contact.html" class="nav-item nav-link">تواصل معنا</a>
            </div>
        </div>

    </div>
</nav>

<!-- Space below navbar -->
<div style="margin-top:90px;"></div>

<!-- Book Section -->
<div class="container-xxl py-5 bg-light">
    <div class="container">

        <div class="text-center mb-4">
            <h2>كتب مختارة</h2>
        </div>

        <!-- Search -->
        <div class="position-relative w-100 w-md-75 mx-auto mb-4 px-2">
            <input class="form-control py-3 shadow-sm" type="text"
                   id="bookSearch"
                   placeholder="ابحث في كنوزنا الروحية..."
                   style="border-radius:30px;">
        </div>

        <!-- Books Grid -->
        <div class="row g-3" id="books-container">

            <!-- Book 1 -->
            <div class="col-6 col-md-4 col-lg-3 col-xl-2 book-item">
                <div class="book-card-mini h-100">
                    <div class="book-img-wrapper">
                        <img src="img/book1.jpg" alt="العقيدة المسيحية">
                        <div class="book-hover-actions">
                            <a href="pdf/book1.pdf" target="_blank"
                               class="btn btn-light rounded-circle">
                                <i class="fa fa-eye text-primary"></i>
                            </a>
                        </div>
                    </div>
                    <div class="p-2 text-center">
                        <h6 class="mb-1">العقيدة المسيحية</h6>
                        <small class="text-muted">لاهوت</small>
                    </div>
                </div>
            </div>

        </div>
    </div>
</div>

<!-- Footer -->
<div class="container-fluid bg-dark text-white text-center py-3">
    © 2026 Nazarene Church
</div>

<!-- Scripts -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
document.getElementById('bookSearch').addEventListener('keyup', function() {
    const query = this.value.toLowerCase();
    document.querySelectorAll('.book-item').forEach(item => {
        const title = item.innerText.toLowerCase();
        item.style.display = title.includes(query) ? "block" : "none";
    });
});
</script>

</body>
</html>
